<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" width="920" height="430" role="img" aria-label="HR Management API terminal session">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2129"/>
      <stop offset="1" stop-color="#11161d"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0.5" y="0.5" width="919" height="429" rx="12" ry="12" fill="#0d1117" stroke="#30363d"/>
  <!-- title bar -->
  <path d="M12 0.5 H908 a12 12 0 0 1 12 12 V40 H0.5 V12 a12 12 0 0 1 12 -12 Z" fill="url(#bar)"/>
  <line x1="0" y1="40" x2="920" y2="40" stroke="#30363d"/>
  <circle cx="22" cy="20" r="6.5" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6.5" fill="#ffbd2e"/>
  <circle cx="66" cy="20" r="6.5" fill="#27c93f"/>
  <text x="460" y="25" text-anchor="middle" fill="#8b949e" font-size="13"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">hr-management-api — bash</text>

  <!-- body -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="13.5" fill="#c9d1d9">

    <text x="24" y="66"><tspan fill="#3fb950">$</tspan> npm run start:dev</text>
    <text x="24" y="86"><tspan fill="#8b949e">info:</tspan> <tspan fill="#3fb950">HTTP server listening on http://localhost:3000</tspan></text>

    <text x="24" y="120"><tspan fill="#3fb950">$</tspan> curl -s -X POST localhost:3000/auth/login \</text>
    <text x="24" y="140">      -H "Content-Type: application/json" \</text>
    <text x="24" y="160">      -d '{"email":"admin@example.com","password":"Admin@12345"}'</text>
    <text x="24" y="180">{ <tspan fill="#79c0ff">"success":</tspan> <tspan fill="#3fb950">true</tspan>, <tspan fill="#79c0ff">"statusCode":</tspan> <tspan fill="#79c0ff">200</tspan>, <tspan fill="#79c0ff">"data":</tspan> {</text>
    <text x="24" y="200">  <tspan fill="#79c0ff">"accessToken":</tspan> <tspan fill="#a5d6ff">"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…"</tspan>, <tspan fill="#79c0ff">"tokenType":</tspan> <tspan fill="#a5d6ff">"Bearer"</tspan>,</text>
    <text x="24" y="220">  <tspan fill="#79c0ff">"expiresIn":</tspan> <tspan fill="#a5d6ff">"1d"</tspan>, <tspan fill="#79c0ff">"user":</tspan> { <tspan fill="#79c0ff">"id":</tspan> <tspan fill="#79c0ff">1</tspan>, <tspan fill="#79c0ff">"email":</tspan> <tspan fill="#a5d6ff">"admin@example.com"</tspan> } } }</text>

    <text x="24" y="254"><tspan fill="#3fb950">$</tspan> curl -s "localhost:3000/employees?search=alice" \</text>
    <text x="24" y="274">      -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIs…"</text>
    <text x="24" y="294">{ <tspan fill="#79c0ff">"success":</tspan> <tspan fill="#3fb950">true</tspan>, <tspan fill="#79c0ff">"data":</tspan> {</text>
    <text x="24" y="314">  <tspan fill="#79c0ff">"items":</tspan> [ { <tspan fill="#79c0ff">"id":</tspan> <tspan fill="#79c0ff">1</tspan>, <tspan fill="#79c0ff">"name":</tspan> <tspan fill="#a5d6ff">"Alice Johnson"</tspan>, <tspan fill="#79c0ff">"salary":</tspan> <tspan fill="#79c0ff">85000</tspan> } ],</text>
    <text x="24" y="334">  <tspan fill="#79c0ff">"meta":</tspan> { <tspan fill="#79c0ff">"page":</tspan> <tspan fill="#79c0ff">1</tspan>, <tspan fill="#79c0ff">"limit":</tspan> <tspan fill="#79c0ff">10</tspan>, <tspan fill="#79c0ff">"total":</tspan> <tspan fill="#79c0ff">1</tspan>, <tspan fill="#79c0ff">"totalPages":</tspan> <tspan fill="#79c0ff">1</tspan> } } }</text>

  </g>
</svg>
